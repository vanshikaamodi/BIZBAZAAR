<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product - BidBazaar</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
        }
        h2 {
            text-align: center;
            color: #343a40;
        }
        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
            color: #555;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        textarea {
            resize: vertical;
            height: 80px;
        }
        button {
            width: 100%;
            background-color: #007bff;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 15px;
            transition: background 0.3s ease;
        }
        button:hover {
            background-color: #0056b3;
        }
        input[type="file"] {
            padding: 5px;
            background-color: #f8f9fa;
            border: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Add a Product</h2>
        <form id="addProductForm" enctype="multipart/form-data">
            <label>Product Name:</label>
            <input type="text" name="productName" placeholder="Enter product name" required>
            
            <label>Description:</label>
            <textarea name="description" placeholder="Enter product description" required></textarea>
            
            <label>Auction Duration (in hours):</label>
            <input type="number" name="auctionDuration" placeholder="e.g. 24" required>
            
            <label>Product Image:</label>
            <input type="file" name="image" accept="image/*" required>

            <label>Authentication Proof:</label>
            <input type="file" name="authProof" required>

            <button type="submit">Submit</button>
        </form>
    </div>

    <script>
        document.getElementById("addProductForm").addEventListener("submit", async function(event) {
            event.preventDefault();
            const formData = new FormData(this);
            
            const response = await fetch("/addProduct", {
                method: "POST",
                body: formData
            });

            const result = await response.json();
            alert(result.message);
        });
    </script>
</body>
</html>
